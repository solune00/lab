<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
</style>

</head>
<body>

<button onclick="nothing()">押さないでください</button>

<p id="text" style="min-height: 3em;"></p>

<p style="margin-top: 100px;">
  <a href="index.html" style="font-size: 12px; color: gray;">もどる</a>
</p>

<script>
function nothing() {

  const messages = [
    "……",
    "押しましたね",
    "大丈夫です",
    "なんですかな？",
    "このボタンは特に意味がありません",
    "なんで押すんですか",
    "ふぁふぁ〜ん",
    "世界とあなた",
    "今日は静かです",
    "さっきより少しだけ時間が進みました"
  ];

  const random = Math.floor(Math.random() * messages.length);
  document.getElementById("text").textContent = messages[random];
}
</script>

</body>
</html>
