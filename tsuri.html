<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>つりゲーム</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: white;
      max-width: 500px;
      margin: auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      font-size: 18px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 15px;
 background: #eeeeee;
  box-shadow: 0 4px 0 #bbbbbb;

    }

button:active {
  transform: translateY(4px);
  box-shadow: 0 0 0 #bbbbbb;
}
h2 {
  font-size: 22px;
}


    #message {
      font-size: 24px;
      margin: 30px 0;
      min-height: 120px;
 display: flex;
  flex-direction: column;
  justify-content: center;
 text-align: center;
}
#messageText {
  width: 100%;
  text-align: center;
  font-size: 24px;
}
    #album {
      margin-top: 30px;
      text-align: left;
    }
#photoBtn {
  background: white;
  border: 1px solid #cccccc;
  box-shadow: none;
margin-top: 0px;
}
#photoBtn:disabled {
  opacity: 0.5;
}

    .fish {
      font-size: 20px;
      margin: 10px 0;
    }

.back-link {
  margin-top: 40px;
  font-size: 14px;
}

  </style>
</head>
<body>
  <div class="box">
    <h1>魚釣りの海辺</h1>

    <p>
      何か釣れるかもしれません。<br>
      魚釣りをしてみましょう！
    </p>
    <button id="foodBtn">🪱エサをつけて釣り糸を垂れる</button>

    <div id="message">
  <div id="messageText">
    しずかな水面です。
  </div>
</div>

    <button id="photoBtn" disabled>
      クーラーボックスに入れる
    </button>

    <div id="album">
      <h2>今日のクーラーボックス</h2>
      <div id="albumList"></div>
    </div>
  </div>
<p class="back-link">
  <a href="index.html">もどる</a>
</p>

  <script>
const messageText = document.getElementById('messageText');
    const foodBtn = document.getElementById('foodBtn');
    const photoBtn = document.getElementById('photoBtn');
    const message = document.getElementById('message');
    const albumList = document.getElementById('albumList');

    const fish = [
   '🐟 おさかな',
  '🐟 おさかな',
  '🐟 おさかな',
 '🐠 おさかな',
'🐠 おさかな',
'🎏 おさかな？',
'🦈 やばいおさかな',
  '🦀 カニ',
  '🦑 いか',
  '🐙 たこ',
  '🍣 おすし',
  '🍣 おすし',
  '🐚 かいがら',
  '🫙 あきビン',

    ];

    let currentFish = '';
let fishCount = 0;

    foodBtn.onclick = () => {
      foodBtn.disabled = true;

      messageText.innerHTML = '釣り糸を垂らした…<br><br>……';

      setTimeout(() => {
        currentFish = fish[Math.floor(Math.random() * fish.length)];

        messageText.innerHTML = `${currentFish} が釣れた！`;

        photoBtn.disabled = false;
        foodBtn.disabled = false;
      }, 2500);
    };

    photoBtn.onclick = () => {
      const div = document.createElement('div');
      div.className = 'fish';
      div.textContent = `${currentFish}`;

      albumList.appendChild(div);

      messageText.innerHTML = `${currentFish} をクーラーに入れた！`;
if (
  !currentFish.includes('あきビン') &&
  !currentFish.includes('かいがら') &&
 !currentFish.includes('おさかな？')
) {
  fishCount++;
}
if (fishCount === 7) {
  messageText.innerHTML += '<br>🎉 大漁！';
}

      photoBtn.disabled = true;
    };
  </script>
</body>
</html>
